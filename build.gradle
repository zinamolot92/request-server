apply plugin: 'java'
apply plugin: 'application'

mainClassName = 'Server'

repositories {
    mavenCentral()
}

jar {
    manifest {
        attributes 'Main-Class': 'Server'
    }
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}